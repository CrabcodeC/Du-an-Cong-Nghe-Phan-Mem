<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dự án Công Nghệ Phần Mềm</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body> 
    <div class="container">
      <h3 class="heading">Đăng Nhập</h3>  
        <form class="form" action="">
          <div class="input-field">
            <input id="username" type="text" required autocomplete="off">
            <label for="username">Tên người dùng</label>
          </div>
          <div class="input-field">
            <input id="password" type="password" required autocomplete="off">
            <label for="password">Mật khẩu</label>
          </div>
          <div class="btn-container">
            <button class="btn">Đăng nhập</button>
            <div class="acc-text">Chưa có tài khoản? <span cursor: pointer;></span> <a href="createAccount.html">Tạo tài khoản</a> </div>
          </div>
        </form>
  </body>
</html>
